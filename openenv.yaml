name: traffic-signal-env
version: "1.0.0"
description: >
  Emergency-aware urban traffic signal control. An LLM agent manages
  a 4-way intersection across 3 tasks of increasing difficulty —
  from basic rush-hour timing to simultaneous emergency response
  and fairness constraints.
tags:
  - traffic
  - urban-mobility
  - emergency-response
  - reinforcement-learning
sdk: docker
app_file: server/app.py

base_url: https://Vijay745-traffic-signal-env.hf.space

tasks:
  - id: task1
    difficulty: easy
    max_steps: 30
    grader:
      type: llm
      prompt_template: "Score this trajectory strictly between 0.0 and 1.0."

  - id: task2
    difficulty: medium
    max_steps: 40
    grader:
      type: llm
      prompt_template: "Score this trajectory strictly between 0.0 and 1.0."

  - id: task3
    difficulty: hard
    max_steps: 60
    grader:
      type: llm
      prompt_template: "Score this trajectory strictly between 0.0 and 1.0."