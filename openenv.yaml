spec_version: 1

name: traffic_signal_env
display_name: "Traffic Signal Control Environment"

description: >
  An intelligent traffic signal control environment where an agent manages
  a 4-way intersection. Tasks range from basic traffic flow optimization
  to emergency vehicle prioritization and multi-objective balancing.

type: space
runtime: fastapi
app: server.app:app
port: 7860

tags:
  - openenv
  - traffic
  - reinforcement-learning
  - urban-mobility

# ---------------- ACTION SPACE ----------------
action_space:
  type: discrete
  fields:
    - name: phase
      type: string
      values: [NS_GREEN, EW_GREEN]
      description: "Traffic light phase selection"

# ---------------- OBSERVATION SPACE ----------------
observation_space:
  fields:
    - name: north_queue
      type: integer
    - name: south_queue
      type: integer
    - name: east_queue
      type: integer
    - name: west_queue
      type: integer
    - name: total_wait_time
      type: float
    - name: throughput
      type: integer
    - name: emergency_direction
      type: string
    - name: emergency_steps_remaining
      type: integer
    - name: done
      type: boolean

# ---------------- REWARD ----------------
reward:
  min: -1.0
  max: 1.0
  description: >
    Reward balances throughput (positive) and waiting time (negative).
    Higher throughput and lower wait time yield better rewards.

# ---------------- TASKS ----------------
tasks:
  - id: task1
    difficulty: easy
    max_steps: 30
    grader:
      type: llm
      prompt_template: >
        You are grading a traffic signal control episode.
        Score the agent strictly between 0.0 and 1.0 based on how well it optimizes rush-hour traffic flow.
        Higher scores should reflect lower waiting time and better throughput.
        Return only a single numeric score.

  - id: task2
    difficulty: medium
    max_steps: 40
    grader:
      type: llm
      prompt_template: >
        You are grading a traffic signal control episode.
        Score the agent strictly between 0.0 and 1.0 based on how well it prioritizes emergency vehicles
        while maintaining overall traffic efficiency.
        Higher scores should reflect faster emergency clearance, lower waiting time, and good throughput.
        Return only a single numeric score.

  - id: task3
    difficulty: hard
    max_steps: 60
    grader:
      type: llm
      prompt_template: >
        You are grading a traffic signal control episode.
        Score the agent strictly between 0.0 and 1.0 based on fairness, throughput,
        waiting time reduction, and emergency handling.
        Higher scores should reflect balanced optimization across all objectives.
        Return only a single numeric score.

